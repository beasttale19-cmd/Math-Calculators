<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Math Calculator</title>
        <link rel="stylesheet" href="../css/font.css">
        <link rel="icon" href="../Images/math.jpg" type="image/jpg">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            .container {
                width:100vw;
                display:flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                height:70vh;
            }

            .calculate {
                background-color:rgba(0, 0, 0, 0.664);
                border-radius:7px;
                width:35vw;
                height:20vw;
                display:flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                flex-wrap:wrap;
                font-size:1.4em;
            }

            button {
                margin-top: 3vh;
                font-size:1.5rem;
                background-color:rgb(139, 63, 9);
                color:white;
            }

            input {
                height:2em;
                background-color:black;
                color:white;
            }

            input::placeholder {
                color:rgb(49, 49, 49);
            }
        </style>
    </head>
    <body>
        <h1>Calculate Rate of Interest</h1>
        <hr></hr>

        <div class="container">
            <div class="calculate">
                <div class="deposit">
                    <label for="">Deposit Amount:</label>
                    <input placeholder="Enter Deposit amount" type="number" id="inDeposit">
                </div>

                <div class="time">
                    <label for="">Time (in yrs):</label>
                    <input placeholder="Enter the Time" type="number" id="inTime">
                </div>
                
                <div class="interest">
                    <label for="">interest:</label>
                    <input placeholder="Enter the interest" type="number" id="inInterest">
                </div>
                <button id="submit">Submit</button>

                <p id="output" class="output">Rate of interest:</p>
            </div>
        </div>

        <script>
            document.getElementById("submit").onclick = function() {
                let p = Number(document.getElementById("inDeposit").value);
                let t = Number(document.getElementById("inTime").value);
                let i = Number(document.getElementById("inInterest").value);

                let r = Number((i * 100)/(p * t))
                let output = document.getElementById("output").textContent = `Rate of interest: ${r}%`
            }
        </script>
    </body>
</html>
