<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Math Calculator</title>
        <link rel="stylesheet" href="../css/font.css">
        <link rel="icon" href="../Images/math.jpg" type="image/jpg">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            .container {
                width:100vw;
                display:flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                height:70vh;
            }

            .calculate {
                background-color:rgba(0, 0, 0, 0.664);
                border-radius:7px;
                width:35vw;
                padding:6vw 3vw;
                display:flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                flex-wrap:wrap;
                font-size:1.4em;
            }

            button {
                margin-top: 3vh;
                font-size:1.5rem;
                background-color:rgb(139, 63, 9);
                color:white;
            }

            input {
                height:2em;
                background-color:black;
                color:white;
            }

            input::placeholder {
                color:rgb(49, 49, 49);
            }
        </style>
    </head>
    <body>
        <h1>Calculate Area of Rectangle</h1>
        <hr></hr>

        <div class="container">
            <div class="calculate">
                <div class="l">
                    <label for="">Length:</label>
                    <input placeholder="Enter the Length" type="number" id="inLength">
                </div>

                <div class="b">
                    <label for="">Breadth:</label>
                    <input placeholder="Enter the Breadth" type="number" id="inBreadth">
                </div>
                
                <div class="unit">
                    <label for="">Unit:</label>
                    <input placeholder="Enter Unit. i.e m²" type="text" id="inUnit">
                </div>
                <button id="submit">Submit</button>

                <p id="output" class="output">Area:</p>
            </div>
        </div>

        <script>
            document.getElementById("submit").onclick = function() {
                let l = document.getElementById("inLength").value;
                let b = document.getElementById("inBreadth").value;
                let unit = document.getElementById("inUnit").value;

                let area = l*b

                let output = document.getElementById("output").textContent = `Area: ${area}${unit}²`
            }
        </script>
    </body>
</html>
