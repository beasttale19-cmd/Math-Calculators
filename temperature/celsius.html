<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Math Calculator</title>
        <link rel="stylesheet" href="../css/font.css">
        <link rel="icon" href="../Images/math.jpg" type="image/jpg">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            .container {
                width:100vw;
                display:flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                height:70vh;
            }

            .calculate {
                background-color:rgba(0, 0, 0, 0.664);
                border-radius:7px;
                width:35vw;
                padding:6vw 3vw;
                display:flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                flex-wrap:wrap;
                font-size:1.4em;
            }

            button {
                margin-top: 3vh;
                font-size:1.5rem;
                background-color:rgb(139, 63, 9);
                color:white;
            }

            input {
                height:2em;
                background-color:black;
                color:white;
            }

            input::placeholder {
                color:rgb(49, 49, 49);
            }

        </style>
    </head>
    <body>
        <h1>Calculate Celsius</h1>
        <hr></hr>

        <div class="container">
            <div class="calculate">
                <div class="celsius">
                    <label for="">Fahrenheit:</label>
                    <input placeholder="Enter the Fahrenheit." type="number" id="inFahrenheit">
                </div>
                <button id="submit">Submit</button>

                <p id="output" class="output">Celsius of the place is :</p>
            </div>
        </div>

        <script>
            document.getElementById("submit").onclick = function() {
                let fahrenheit = document.getElementById("inFahrenheit").value;

                let celsius = (fahrenheit - 32) / 1.8

                document.getElementById("output").textContent = `Celsius of the place is : ${celsius.toFixed(2)}°C`
            }
        </script>
    </body>
</html>
